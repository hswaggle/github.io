  body {
    margin: 0;

    background: #000;
    color: white;
    display: flex;
    height: 200vh;
  }

  .container {
    display: flex;
    width: 100%;
  }

  .legend {
    width: 250px;
    background: #111;
    padding: 20px;
    border-right: 1px solid #222;
    overflow-y: auto;
  }

  .legend h2 {
    margin-top: 0;
    color: white;
  }

  .legend-item {
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }

  legend input {
    accent-color: #ffcc00;
  }

  .map-wrapper {
    flex: 1;
    position: relative;
    background: #000;
  }

  #map {
    width: 100%;
    height: 100%;
    display: block;
  }

  svg {
    max-width: 100%;
    max-height: 100%;
  }

  .hidden {
    display: none;
  }
</style>
</head>

<script>
  const svg = document.getElementById("map");
  const controlsContainer = document.getElementById("layer-controls");

  // Grab only top-level groups (layers)
  const layers = Array.from(svg.children).filter(el => el.tagName === "g" && el.id);

  layers.forEach(layer => {
    const wrapper = document.createElement("div");
    wrapper.className = "legend-item";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = true;
    checkbox.dataset.layer = layer.id;

    checkbox.addEventListener("change", () => {
      layer.classList.toggle("hidden", !checkbox.checked);
    });

    const label = document.createElement("label");
    label.textContent = layer.id.replace(/_/g, " ");

    wrapper.appendChild(checkbox);
    wrapper.appendChild(label);
    controlsContainer.appendChild(wrapper);
  });
</script>

    zoomEnabled: true,
    controlIconsEnabled: false,
    fit: true,
    center: true,

  });
</script>
